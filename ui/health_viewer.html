<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RST — Health</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --surface2: #1e2536;
    --surface3: #242d42;
    --border: #2a3347;
    --border2: #3a4560;
    --accent: #4f8ef7;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --heading: #f8fafc;
    --header-h: 54px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .window-header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    flex-shrink: 0;
  }

  .window-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--heading);
    letter-spacing: 0.01em;
  }

  .header-meta {
    margin-left: auto;
    display: flex;
    gap: 16px;
    align-items: baseline;
  }

  .header-meta span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .header-meta strong {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 12px;
    color: var(--text);
    margin-left: 6px;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .content-inner {
    max-width: 820px;
    margin: 0 auto;
  }

  /* ── EMPTY / ERROR STATE ─────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--text3);
  }
  .empty-state h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .empty-state p {
    font-size: 13px;
    max-width: 420px;
    margin: 0 auto;
  }

  /* ── EXPANDABLE SECTION ──────────────────────────────────────────────── */
  .rst-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .rst-section[open] {
    border-color: var(--border2);
  }

  .rst-section__summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
    transition: background 0.12s;
  }

  .rst-section__summary::-webkit-details-marker { display: none; }

  .rst-section__summary:hover { background: var(--surface2); }

  .rst-section[open] .rst-section__summary {
    border-bottom: 1px solid var(--border);
  }

  .rst-section__title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--heading);
    letter-spacing: 0.01em;
    flex: 1;
  }

  .rst-section__chevron {
    width: 8px;
    height: 8px;
    border-right: 1.5px solid var(--text2);
    border-bottom: 1.5px solid var(--text2);
    transform: rotate(-45deg);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .rst-section[open] .rst-section__chevron {
    transform: rotate(45deg);
  }

  .rst-section__body {
    padding: 4px 18px 8px;
    background: var(--surface);
  }

  .rst-section__dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text3);
  }
  .rst-section__dot--ok { background: var(--accent3); }
  .rst-section__dot--warn { background: var(--warn); }
  .rst-section__dot--info { background: var(--accent); }

  /* ── ROW ────────────────────────────────────────────────────────────── */
  .rst-section__row {
    display: flex;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .rst-section__row:last-child { border-bottom: none; }

  .rst-section__row-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text3);
    width: 160px;
    flex-shrink: 0;
  }

  .rst-section__row-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    word-break: break-word;
  }

  .rst-section__row-value--muted { color: var(--text3); font-style: italic; }
  .rst-section__row-value--ok    { color: var(--accent3); }
  .rst-section__row-value--warn  { color: var(--warn); }

  /* Inline sub-value (monospace, smaller) */
  .sub {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="window-header">
    <div class="window-title">RST · HEALTH SNAPSHOT</div>
    <div class="header-meta">
      <span>DEVICE<strong data-field="device">—</strong></span>
      <span>CAPTURED<strong data-field="captured">—</strong></span>
    </div>
  </div>

  <div class="content">
    <div class="content-inner" id="sections">
      <!-- Sections rendered by JS -->
    </div>
  </div>

<script>
  const fmt = {
    mb(n) { return (n == null) ? '—' : n.toLocaleString() + ' MB'; },
    gb(n) { return (n == null) ? '—' : n.toLocaleString() + ' GB'; },
    pct(n) { return (n == null) ? '—' : n + '%'; },
    num(n) { return (n == null) ? '—' : n.toLocaleString(); },
    str(s) { return (s == null || s === '') ? '—' : s; },
    bool(v) {
      if (v === true) return 'Enabled';
      if (v === false) return 'Disabled';
      return 'Unknown';
    },
    mbps(n) { return (n == null) ? '—' : n.toLocaleString() + ' Mbps'; },
    time(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleString();
      } catch { return iso; }
    },
  };

  function row(label, value, cls) {
    const valClass = cls ? ` rst-section__row-value--${cls}` : '';
    const v = (value === null || value === undefined || value === '') ? '—' : value;
    const muted = (v === '—') ? ' rst-section__row-value--muted' : '';
    return `
      <div class="rst-section__row">
        <div class="rst-section__row-label">${label}</div>
        <div class="rst-section__row-value${valClass}${muted}">${v}</div>
      </div>`;
  }

  function section(opts) {
    const { title, dotClass = '', open = false, rows = [] } = opts;
    return `
      <details class="rst-section"${open ? ' open' : ''}>
        <summary class="rst-section__summary">
          ${dotClass ? `<span class="rst-section__dot rst-section__dot--${dotClass}"></span>` : ''}
          <span class="rst-section__title">${title}</span>
          <span class="rst-section__chevron"></span>
        </summary>
        <div class="rst-section__body">
          ${rows.join('')}
        </div>
      </details>`;
  }

  function render(snap) {
    const host = document.getElementById('sections');

    if (!snap) {
      host.innerHTML = `
        <div class="empty-state">
          <h2>No health snapshot yet</h2>
          <p>Open Revit and click <strong>Profiler</strong> or <strong>Loader</strong> once to capture a snapshot, then reopen this window.</p>
        </div>`;
      return;
    }

    // Header meta
    const id = snap.identity || {};
    document.querySelector('[data-field="device"]').textContent = id.deviceName || '—';
    document.querySelector('[data-field="captured"]').textContent = fmt.time(snap.captureTimestamp);

    const cpu  = snap.cpu     || {};
    const ram  = snap.ram     || {};
    const gpu  = snap.gpu     || {};
    const disk = snap.disk    || {};
    const dsp  = snap.display || {};
    const net  = snap.network || {};
    const os   = snap.os      || {};
    const rv   = snap.revit   || {};
    const mdl  = rv.model     || {};
    const wbs  = rv.warningsBySeverity || {};

    // Heuristic status dots
    const ramWarn  = (ram.usedPercent != null && ram.usedPercent >= 85);
    const diskWarn = (disk.usedPercent != null && disk.usedPercent >= 90);
    const hwDot    = (ramWarn || diskWarn) ? 'warn' : 'ok';

    const accelWarn = (rv.hardwareAcceleration === false);
    const warnLot   = (rv.warningsCount != null && rv.warningsCount >= 500);
    const revitDot  = (accelWarn || warnLot) ? 'warn' : 'info';

    const severityBreakdown = Object.keys(wbs).length
      ? Object.entries(wbs).map(([k, v]) => `${k}: ${v}`).join(' · ')
      : '';

    const html = [
      section({
        title: 'Hardware',
        dotClass: hwDot,
        open: true,
        rows: [
          row('User', id.windowsUsername),
          row('CPU', cpu.name
            ? `${cpu.name}<span class="sub">${cpu.physicalCores || '?'} cores · ${cpu.logicalCores || '?'} logical</span>`
            : null),
          row('RAM', (ram.totalMB != null)
            ? `${fmt.mb(ram.totalMB)}<span class="sub">${fmt.mb(ram.usedMB)} used · ${fmt.pct(ram.usedPercent)}</span>`
            : null, ramWarn ? 'warn' : null),
          row('GPU', gpu.name
            ? `${gpu.name}<span class="sub">driver ${fmt.str(gpu.driverVersion)} · VRAM ${fmt.mb(gpu.vramTotalMB)}</span>`
            : null),
          row('Disk (C:)', (disk.totalGB != null)
            ? `${fmt.str(disk.friendlyName)}<span class="sub">${fmt.str(disk.type)} · ${fmt.gb(disk.availableGB)} free of ${fmt.gb(disk.totalGB)} · ${fmt.pct(disk.usedPercent)} used</span>`
            : null, diskWarn ? 'warn' : null),
        ],
      }),

      section({
        title: 'Display & Network',
        dotClass: 'info',
        rows: [
          row('Resolution', dsp.primaryResolution),
          row('Monitors', fmt.num(dsp.monitorCount)),
          row('Adapter', net.adapterName
            ? `${net.adapterName}<span class="sub">${fmt.str(net.type)}</span>`
            : null),
          row('Speed', fmt.mbps(net.speedMbps)),
        ],
      }),

      section({
        title: 'Revit',
        dotClass: revitDot,
        open: true,
        rows: [
          row('Version', rv.version
            ? `${rv.version}<span class="sub">build ${fmt.str(rv.build)}</span>`
            : null),
          row('Username', rv.username),
          row('Hardware Accel',
            fmt.bool(rv.hardwareAcceleration),
            rv.hardwareAcceleration === true ? 'ok' :
            rv.hardwareAcceleration === false ? 'warn' : null),
          row('Model', mdl.name
            ? `${mdl.name}${mdl.sizeMB != null ? `<span class="sub">${mdl.sizeMB} MB · ${fmt.str(mdl.path)}</span>` : ''}`
            : null),
          row('Warnings', (rv.warningsCount != null)
            ? `${fmt.num(rv.warningsCount)}${severityBreakdown ? `<span class="sub">${severityBreakdown}</span>` : ''}`
            : null, warnLot ? 'warn' : null),
        ],
      }),

      section({
        title: 'Operating System',
        rows: [
          row('Name', [os.name, os.release].filter(Boolean).join(' ') || null),
          row('Build', os.build || os.version),
        ],
      }),
    ].join('');

    host.innerHTML = html;
  }

  async function load() {
    try {
      const snap = await window.pywebview.api.get_snapshot();
      render(snap);
    } catch (e) {
      render(null);
    }
  }

  window.addEventListener('pywebviewready', load);
</script>
</body>
</html>
