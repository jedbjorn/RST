  // ── ICON PICKER ─────────────────────────────────────────────────────────
  function pickIconForSlot(slotIdx) {
    if (!state.currentPanel || !state.panels[state.currentPanel]) return;
    const slot = state.panels[state.currentPanel].slots[slotIdx];
    if (!slot || slot.type !== 'tool') return;

    if (window.pywebview && window.pywebview.api && window.pywebview.api.pick_icon) {
      window.pywebview.api.pick_icon(slot.name).then(result => {
        if (result && result.filename) {
          slot.iconFile = result.filename;
          renderSlotList();
          showToast('Icon set', slot.name + ' → ' + result.filename);
        }
      }).catch(() => {});

  function openProfilesFolder() {
    if (window.pywebview && window.pywebview.api && window.pywebview.api.open_profiles_folder) {

  // ── PROFILE DROPDOWN ─────────────────────────────────────────────────────
  function populateProfileDropdown(profileNames) {
    state.profileList = profileNames || [];
    const menu    = document.getElementById('profileMenu');
    const divider = menu.querySelector('.profile-menu-divider');
    // Remove all existing profile items (but keep divider and "+ New" item)
    menu.querySelectorAll('.profile-menu-item:not(.new-item)').forEach(el => el.remove());
    // Insert "New Profile" default option at top
    const newOpt = document.createElement('div');
    newOpt.className = 'profile-menu-item' + (state.currentProfile === 'New Profile' ? ' current' : '');
    newOpt.textContent = 'New Profile';
    newOpt.addEventListener('click', () => {
      loadNewProfile();
      closeProfileMenu();
    });
    menu.insertBefore(newOpt, divider);
    // Insert each fetched profile
    state.profileList.forEach(name => {
      const item = document.createElement('div');
      item.className = 'profile-menu-item' + (state.currentProfile === name ? ' current' : '');
      item.textContent = name;
      item.addEventListener('click', () => {
        loadExistingProfile(name);
        closeProfileMenu();
      });
      menu.insertBefore(item, divider);
    });
  }

  function loadNewProfile() {
    state.currentProfile = 'New Profile';
    document.getElementById('profileNameDisplay').textContent = 'New Profile';
    state.stacks = {};
    state.panels = {};
    state.allTools = [];
    state.currentPanel = null;
    state.expandedStack = null;
    document.getElementById('tabNameInput').value = '';
    document.getElementById('tabNameDisplay').textContent = 'New Tab';
    document.getElementById('panelNameInput').value = '';
    document.getElementById('mockTitle').textContent = '';
    renderAll();
  }

  function loadExistingProfile(name) {
    if (window.pywebview && window.pywebview.api && window.pywebview.api.load_profile_into_editor) {
      window.pywebview.api.load_profile_into_editor(name).then(profile => {
        if (!profile) return;
        if (profile._copied) {
          showToast('Copy Created', profile._message || 'Profile currently loaded. A copy has been made for editing.', 5000);
        }
        applyProfileToEditor(profile);
      }).catch(err => {
        showToast('Load failed', String(err));
      });
    }
  }

  function applyProfileToEditor(profile) {
    // Set profile name
    state.currentProfile = profile.profile || 'Loaded Profile';
    document.getElementById('profileNameDisplay').textContent = state.currentProfile;

    // Set tab name
    document.getElementById('tabNameInput').value = profile.tab || '';
    document.getElementById('tabNameDisplay').textContent = profile.tab || 'New Tab';

    // Restore opacity
    state.panelOpacity = profile.panelOpacity != null ? profile.panelOpacity : 100;
    document.getElementById('opacitySlider').value = state.panelOpacity;
    document.getElementById('opacityVal').textContent = state.panelOpacity + '%';

    // Rebuild stacks
    state.stacks = {};
    if (profile.stacks) {
      Object.entries(profile.stacks).forEach(([name, stackDef]) => {
        state.stacks[name] = { tools: (stackDef.tools || []).map(t => t.name || t) };
      });
    }

    // Rebuild panels
    state.panels = {};
    state.currentPanel = null;
    if (profile.panels && Array.isArray(profile.panels)) {
      profile.panels.forEach(p => {
        state.panels[p.name] = {
          color: p.color || '#4f8ef7',
          active: true,
          slots: (p.slots || []).map(slot => {
            const s = { type: slot.type, name: slot.name };
            if (slot.baseName) s.baseName = slot.baseName;
            if (slot.type === 'tool') {
              s.icon = slot.icon || '●';
              s.commandId = slot.commandId || '';
              s.sourceTab = slot.sourceTab || null;
              s.sourcePanel = slot.sourcePanel || null;
              if (slot.iconFile) s.iconFile = slot.iconFile;
            }
            return s;
          }),
        };
      });
      // Select first panel
      const firstPanel = Object.keys(state.panels)[0];
      if (firstPanel) {
        state.currentPanel = firstPanel;
        document.getElementById('panelNameInput').value = firstPanel;
        document.getElementById('mockTitle').textContent = firstPanel;
        applyColorToMock(state.panels[firstPanel].color);
      }
    }

    // Do NOT rebuild state.allTools here — it is populated by the auto-record
    // scan with ALL Revit commands. The profile's tools are already placed in
    // panels/stacks above, so renderToolList() will mark them as checked.
    // Only fall back to rebuilding if auto-record hasn't run yet (allTools empty).
    if (!state.allTools || state.allTools.length === 0) {
      const seen = new Set();
      state.allTools = [];
      // Gather from panel slots
      Object.values(state.panels).forEach(panel => {
        panel.slots.forEach(slot => {
          if (slot.type === 'tool' && slot.commandId && !seen.has(slot.commandId)) {
            seen.add(slot.commandId);
            let sourceTab = null;
            const m = slot.commandId && slot.commandId.match(/^CustomCtrl_%CustomCtrl_%([^%]+)%/);
            if (m) sourceTab = m[1];
            state.allTools.push({
              name: slot.name,
              baseName: slot.baseName || slot.name,
              icon: slot.icon || '●',
              sourceTab: sourceTab || slot.sourceTab || null,
              sourcePanel: slot.sourcePanel || null,
              commandId: slot.commandId,
            });
          }
        });
      });
      // Gather from stacks
      Object.values(state.stacks).forEach(stack => {
        stack.tools.forEach(toolName => {
          if (!state.allTools.find(t => t.name === toolName)) {
            let cmdId = null;
            if (profile.stacks) {
              Object.values(profile.stacks).forEach(sd => {
                const found = (sd.tools || []).find(t => (t.name || t) === toolName);
                if (found && found.commandId) cmdId = found.commandId;
              });
            }
            let sourceTab = null;
            if (cmdId) {
              const m = cmdId.match(/^CustomCtrl_%CustomCtrl_%([^%]+)%/);
              if (m) sourceTab = m[1];
            }
            state.allTools.push({
              name: toolName,
              icon: '●',
              sourceTab: sourceTab,
              commandId: cmdId,
            });
          }
        });
      });
    }

    state.expandedStack = null;

    // Update profile dropdown highlight
    document.querySelectorAll('#profileMenu .profile-menu-item').forEach(el => {
      el.classList.toggle('current', el.textContent === state.currentProfile);
    });

    renderAll();
  }

  function renderAll() {
    renderPanelList();
    renderStackList();
    renderTabCanvas();
    renderPanelSlotList();
    renderDetectedAddins();
    renderToolList();
    renderSlotList();
    renderMockPreview();
    checkExportReady();
  }

  // ── PYWEBVIEW READY ──────────────────────────────────────────────────────
  window.addEventListener('pywebviewready', async function() {
    try {
      // Fetch addin lookup
      if (window.pywebview && window.pywebview.api && window.pywebview.api.get_addin_lookup) {
        const lookup = await window.pywebview.api.get_addin_lookup();
        if (lookup && typeof lookup === 'object') {
          ADDIN_LOOKUP = lookup;
        }
      }

      // Fetch loaded add-ins from Revit session
      if (window.pywebview && window.pywebview.api && window.pywebview.api.get_loaded_addins) {
        const addins = await window.pywebview.api.get_loaded_addins();
        if (Array.isArray(addins)) {
          LOADED_ADDINS = addins;
        }
      }

      renderDetectedAddins();
    } catch(e) { /* ignore */ }

    try {
      // Fetch Revit version
      if (window.pywebview && window.pywebview.api && window.pywebview.api.get_revit_version) {
        const ver = await window.pywebview.api.get_revit_version();
        if (ver) {
          document.getElementById('rvtVersionDisplay').textContent = 'Revit ' + ver;
        }
      }
    } catch(e) { /* ignore */ }

    try {
      // Fetch profile list
      if (window.pywebview && window.pywebview.api && window.pywebview.api.get_profiles) {
        const profiles = await window.pywebview.api.get_profiles();
        if (Array.isArray(profiles)) {
          populateProfileDropdown(profiles);
        }
      }
    } catch(e) { /* ignore */ }

    try {
      // Load persistent custom URL tools
      if (window.pywebview && window.pywebview.api && window.pywebview.api.get_custom_tools) {
        const custom = await window.pywebview.api.get_custom_tools();
        if (Array.isArray(custom)) {
          custom.forEach(function(ct) {
            if (!state.allTools.find(function(t) { return t.commandId === ct.commandId && t.sourceTab === 'Custom'; })) {
              state.allTools.push(ct);
            }
          });
          renderToolList();
        }
      }
    } catch(e) { /* ignore */ }

  });

  // ── INIT ──────────────────────────────────────────────────────────────────
  // Wire hex action buttons
  var hexApplyBtn = document.querySelector('.hex-apply');
  if (hexApplyBtn) hexApplyBtn.addEventListener('click', applyHex);
  var hexSaveBtn = document.querySelector('.hex-save');
  if (hexSaveBtn) hexSaveBtn.addEventListener('click', saveHexFavorite);

  renderAll();

  // Initialize profile dropdown with empty state (pywebviewready will populate)
  populateProfileDropdown([]);

</script>
